<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cadastro de veículos para o sistema de gestãoda GreenLog">
    <meta name="author" content="Gabriel Melgaço, Marcos Edeson, Caua Anselmo, Rafael Previtera, Thaisa Kelry">
    <title>GreenLog - Sistema Frota</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_veiculos.css">
</head>
<body>

    <header class="header">
        <div class="logo-area">
            <img src="https://png.pngtree.com/png-vector/20240317/ourmid/pngtree-earth-globe-surrounded-by-green-leaves-symbolizing-environmental-protection-and-sustainability-png-image_11989157.png" alt="Logo GreenLog">
        </div>
        
<nav class="menu">
    <a href="site_original.html" class="link-externo">← Voltar ao Início</a>
    <a href="#tela-lista" class="btn-menu">Veículos</a>
</nav>
    </header>

    <main class="main">
        
        <div id="tela-form" class="box">
            <h2>Cadastro de Veículo</h2>
            <form action="#">
                <div class="campo">
                    <label>Placa</label>
                    <input type="text">
                </div>
                <div class="campo">
                    <label>Marca</label>
                    <input type="text">
                </div>
                <div class="campo">
                    <label>Modelo</label>
                    <input type="text">
                </div>
                <div class="campo">
                    <label>Ano</label>
                    <input type="number">
                </div>
                <div class="campo">
                    <label>Status</label>
                    <select>
                        <option>Ativo</option>
                        <option>Manutenção</option>
                    </select>
                </div>
                <div class="campo largura-total">
                    <label>Observações</label>
                    <textarea></textarea>
                </div>
                
                <div class="botoes-form">
                    <button type="submit" class="btn-salvar">Salvar no Banco</button>
                    <a href="#tela-lista" class="btn-cancelar">Cancelar</a>
                </div>
            </form>
        </div>

        <div id="tela-lista" class="box">
            <div class="topo-tabela">
                <h2>Veículos Cadastrados</h2>
                <a href="#tela-form" class="btn-novo-veiculo">+ Novo Veículo</a>
            </div>
            
            <table class="tabela-frota">
                <thead>
                    <tr>
                        <th>Placa</th>
                        <th>Marca/Modelo</th>
                        <th>Ano</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><strong>ABC-1234</strong></td>
                        <td>Volvo FH 540</td>
                        <td>2023</td>
                        <td class="status-ativo">Ativo</td>
                        <td>
                            <a href="#tela-form" class="acao-editar">Editar</a>
                            <span class="acao-excluir">Excluir</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <section class="banner">
            <img src="https://t3.ftcdn.net/jpg/07/47/64/36/360_F_747643621_F9SH5FMdxOwHVXfYSlN4xEGjJ3GRuDjn.jpg">
        </section>
        
    </main>

</body>
</html>
