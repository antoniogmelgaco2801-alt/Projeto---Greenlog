<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Viagem</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style_viagens.css">
</head>
<body>
    <main class="container">
        <form>
            <h1>Registro de Viagem</h1>
            <div class="veiculo">
                <input placeholder="Veículo" type="text" required>
            </div>
            <div class="data">
                <input placeholder="Data" type="date" required>
            </div>
            <div class="origem">
                <input placeholder="Origem" type="text" required>
            </div>
            <div class="destino">
                <input placeholder="Destino" type="text" required>
            </div>
            </div>
            <div class="status">
                <input placeholder="Status" type="text">
            </div>
            <button type="submit">Registrar</button>
            <a href="site_original.html">Voltar para o site</a>
        </form>
    </main>
</body>
</html>
