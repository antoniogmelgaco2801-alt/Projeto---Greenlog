<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Viagem</title>
    <link rel="stylesheet" href="siteregistro.css">
</head>
<body>
    <main class="container">
        <form>
            <h1>Registro de Viagem</h1>
            <div class="veiculo">
                <input placeholder="Veículo" type="text">
            </div>
            <div class="data">
                <input placeholder="Data" type="number">
            </div>
            <div class="origem">
                <input placeholder="Origem" type="text">
            </div>
            <div class="destino">
                <input placeholder="Destino" type="text">
            </div>
            </div>
            <div class="status">
                <input placeholder="Status" type="text">
            </div>
            <button type="submit">Registrar</button>
        </form>
    </main>
</body>
</html>
